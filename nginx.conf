# intermediario entre el navegador y Javalin
server {
    listen 80;
    server_name gestion-encuestas-pucmm.aovp.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name gestion-encuestas-pucmm.aovp.dev;
    resolver 127.0.0.11 valid=30s;

    ssl_certificate     /etc/letsencrypt/live/gestion-encuestas-pucmm.aovp.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gestion-encuestas-pucmm.aovp.dev/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /login {
        proxy_pass http://api:7000/login;
        proxy_set_header Host $host;
    }

    location /encuestas/ {
        proxy_pass http://api:7000/encuestas/;
        proxy_set_header Host $host;
    }

    location = /encuestas {
        proxy_pass http://api:7000/encuestas;
        proxy_set_header Host $host;
    }

    location /usuarios/ {
        proxy_pass http://api:7000/usuarios/;
        proxy_set_header Host $host;
    }

    location = /usuarios {
        proxy_pass http://api:7000/usuarios;
        proxy_set_header Host $host;
    }

    location /sync {
        proxy_pass http://api:7000/sync;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://api:7000/api/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /grpc/ {
        proxy_pass http://api:7000/grpc/;
        proxy_set_header Host $host;
        proxy_set_header Content-Type $content_type;
    }

    location /ping {
        proxy_pass http://api:7000/ping;
        proxy_set_header Host $host;
    }

    location /encuestas/sync {
        proxy_pass http://api:7000/encuestas/sync;
        proxy_set_header Host $host;
    }

}