server {
    listen 80;
    resolver 127.0.0.11 valid=30s;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /login {
        proxy_pass http://api:7000/login;
        proxy_set_header Host $host;
    }

    location /encuestas/ {
        proxy_pass http://api:7000/encuestas/;
        proxy_set_header Host $host;
    }

    location = /encuestas {
        proxy_pass http://api:7000/encuestas;
        proxy_set_header Host $host;
    }

    location /usuarios/ {
        proxy_pass http://api:7000/usuarios/;
        proxy_set_header Host $host;
    }

    location = /usuarios {
        proxy_pass http://api:7000/usuarios;
        proxy_set_header Host $host;
    }

    location /sync {
        proxy_pass http://api:7000/sync;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        proxy_pass http://api:7000/api/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /grpc/ {
        proxy_pass http://api:7000/grpc/;
        proxy_set_header Host $host;
        proxy_set_header Content-Type $content_type;
    }

}