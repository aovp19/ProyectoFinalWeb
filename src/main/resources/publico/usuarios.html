<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/db.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuestas PUCMM - Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <script src="/js/base.js"></script>
    <style>
        :root {
            --cream: #FAF8F4;
            --ink: #1A1714;
            --ink-light: #6B6560;
            --ink-lighter: #B8B3AE;
            --accent: #2B5BDB;
            --accent-light: #E8EEFF;
            --success: #1A7A4A;
            --success-bg: #E8F5EE;
            --warning: #B85C00;
            --warning-bg: #FFF3E8;
            --danger: #A32D2D;
            --danger-bg: #FCEBEB;
            --border: #E5E1DB;
            --surface: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── LAYOUT ── */
        .app-shell { display: flex; min-height: 100vh; }

        .sidebar {
            width: 220px;
            background: var(--ink);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 100;
        }

        .main {
            flex: 1;
            margin-left: 220px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: var(--surface);
            border-bottom: 0.5px solid var(--border);
            padding: 0.85rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title { font-size: 16px; font-weight: 600; color: var(--ink); }
        .topbar-sub   { font-size: 12px; color: var(--ink-light); }

        .topbar-actions { display: flex; align-items: center; gap: 10px; }

        /* ── PAGE BODY ── */
        .page-body { padding: 1.5rem; }

        /* ── ALERTAS ── */
        .alert-glass-danger {
            background: var(--danger-bg);
            border: 0.5px solid rgba(163,45,45,0.25);
            color: var(--danger);
            border-radius: 8px;
            font-size: 13px;
            padding: 10px 14px;
        }

        .alert-glass-success {
            background: var(--success-bg);
            border: 0.5px solid rgba(26,122,74,0.25);
            color: var(--success);
            border-radius: 8px;
            font-size: 13px;
            padding: 10px 14px;
        }

        /* ── TOOLBAR ── */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toolbar-left { display: flex; align-items: center; gap: 10px; }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--ink-light);
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        /* ── BOTONES ── */
        .btn-primary-glass {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background .2s;
            white-space: nowrap;
        }

        .btn-primary-glass:hover { background: #1A3A9E; }

        .btn-danger-glass {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--danger-bg);
            color: var(--danger);
            border: 0.5px solid rgba(163,45,45,0.2);
            border-radius: 8px;
            padding: 9px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background .2s;
        }

        .btn-danger-glass:hover { background: #F7C1C1; }

        .btn-logout {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(163,45,45,0.08);
            border: 0.5px solid rgba(163,45,45,0.2);
            color: var(--danger);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background .2s;
        }

        .btn-logout:hover { background: var(--danger-bg); }

        /* ── TABLA ── */
        .table-wrap {
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .table-glass {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
        }

        .table-glass thead th {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--ink-light);
            font-weight: 500;
            padding: 10px 16px;
            background: var(--cream);
            border-bottom: 0.5px solid var(--border);
            text-align: left;
        }

        .table-glass tbody td {
            padding: 11px 16px;
            border-bottom: 0.5px solid var(--border);
            color: var(--ink) !important;
            font-size: 13px;
            background: transparent !important;
            vertical-align: middle;
        }

        .table-glass tbody tr:last-child td { border-bottom: none; }
        .table-glass tbody tr:hover td { background: #F7F5F1 !important; }

        /* ── FILA INACTIVA ── */
        .fila-inactiva td { opacity: 0.5; }

        /* ── BADGES ── */
        .badge-rol {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 0.3px;
        }

        .badge-admin-rol     { background: var(--accent-light); color: var(--accent); }
        .badge-encuestador-rol { background: var(--success-bg); color: var(--success); }

        .badge-inactivo {
            display: inline-block;
            background: var(--danger-bg);
            color: var(--danger);
            font-size: 10px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 20px;
            margin-left: 6px;
            vertical-align: middle;
        }

        /* ── DROPDOWN ── */
        .btn-tres-puntos {
            background: transparent;
            border: 0.5px solid var(--border);
            color: var(--ink-light);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            transition: all .15s;
            font-size: 14px;
        }

        .btn-tres-puntos:hover {
            background: var(--cream);
            color: var(--ink);
        }

        .dropdown-menu-glass {
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: 10px;
            padding: 6px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .dropdown-menu-glass .dropdown-item {
            color: var(--ink);
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 13px;
            transition: background .15s;
        }

        .dropdown-menu-glass .dropdown-item:hover {
            background: var(--cream);
            color: var(--ink);
        }

        .dropdown-menu-glass .dropdown-item.text-danger-glass {
            color: var(--danger);
        }

        .dropdown-menu-glass .dropdown-item.text-danger-glass:hover {
            background: var(--danger-bg);
        }

        .dropdown-menu-glass .dropdown-divider {
            border-color: var(--border);
            margin: 4px 0;
        }

        /* ── OFFCANVAS ── */
        .offcanvas {
            background: var(--surface) !important;
            border-left: 0.5px solid var(--border) !important;
        }

        .offcanvas-title { color: var(--ink) !important; font-weight: 600; font-size: 15px; }
        .offcanvas-header { border-bottom: 0.5px solid var(--border); padding: 1.25rem 1.5rem; }
        .offcanvas-body { padding: 1.5rem; }
        .btn-close { filter: none !important; opacity: 0.4; }
        .btn-close:hover { opacity: 0.8; }

        .form-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 6px;
        }

        .form-control, .form-select {
            background: var(--cream);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--ink);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
        }

        .form-control:focus, .form-select:focus {
            background: white;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(43,91,219,0.08);
            color: var(--ink);
        }

        .form-control::placeholder { color: var(--ink-lighter); }

        /* ── MODAL ── */
        .modal-glass .modal-content {
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: 12px;
            color: var(--ink);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        .modal-glass .modal-header {
            border-bottom: 0.5px solid var(--border);
            padding: 1.25rem 1.5rem;
        }

        .modal-glass .modal-footer {
            border-top: 0.5px solid var(--border);
            padding: 1rem 1.5rem;
        }

        .modal-glass .modal-title { font-size: 15px; font-weight: 600; color: var(--ink); }
        .modal-glass .modal-body p { font-size: 13px; color: var(--ink-light); }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
        }
    </style>
</head>
<body>

<div class="app-shell">

    <!-- Sidebar — base.js lo rellena -->
    <div class="sidebar"></div>

    <div class="main">

        <!-- Topbar -->
        <div class="topbar">
            <div>
                <div class="topbar-title">Gestión de usuarios</div>
                <div class="topbar-sub">Administración de cuentas del sistema</div>
            </div>
            <div class="topbar-actions">
                <button class="btn-logout" onclick="cerrarSesion()">
                    <i class="bi bi-box-arrow-right"></i>Salir
                </button>
            </div>
        </div>

        <!-- Contenido -->
        <div class="page-body">

            <!-- Alertas -->
            <div id="alerta" class="alert-glass-danger d-none mb-3">
                <i class="bi bi-exclamation-circle me-2"></i>
                <span id="mensajeAlerta"></span>
            </div>
            <div id="alertaExito" class="alert-glass-success d-none mb-3">
                <i class="bi bi-check-circle me-2"></i>
                <span id="mensajeExito"></span>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <label class="toggle-label" for="toggleActivos">
                        <input class="form-check-input" type="checkbox" id="toggleActivos"
                               checked onchange="cargarUsuarios()">
                        Solo activos
                    </label>
                </div>
                <button class="btn-primary-glass" onclick="abrirPanelCrear()">
                    <i class="bi bi-plus-lg"></i>Nuevo usuario
                </button>
            </div>

            <!-- Tabla -->
            <div class="table-wrap">
                <table class="table-glass">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th class="d-none d-md-table-cell">Apellido</th>
                        <th class="d-none d-md-table-cell">Email</th>
                        <th>Rol</th>
                        <th style="text-align:right">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tablaUsuarios">
                    <tr>
                        <td colspan="5" style="text-align:center;color:var(--ink-light);padding:2rem;">
                            <span class="spinner-border spinner-border-sm me-2"></span>
                            Cargando...
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<!-- Offcanvas Crear/Editar -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="panelUsuario">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="tituloPanel">Nuevo usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <input type="hidden" id="activoUsuario">
        <input type="hidden" id="usuarioId">
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" placeholder="Nombre">
        </div>
        <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" class="form-control" id="apellido" placeholder="Apellido">
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="emailUsuario" placeholder="correo@ce.pucmm.edu.do">
        </div>
        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="passwordUsuario" placeholder="••••••••">
        </div>
        <div class="mb-3">
            <label class="form-label">Rol</label>
            <select class="form-select" id="rolUsuario">
                <option value="ADMIN">Administrador</option>
                <option value="ENCUESTADOR">Encuestador</option>
            </select>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button class="btn-primary-glass w-100 justify-content-center" onclick="guardarUsuario()">
                <i class="bi bi-save"></i>Guardar
            </button>
            <button class="btn-danger-glass" data-bs-dismiss="offcanvas">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>
</div>

<!-- Modal Confirmar Desactivar -->
<div class="modal fade modal-glass" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirmar desactivación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>¿Estás seguro que deseas desactivar este usuario? Podrás reactivarlo más adelante.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-danger-glass" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn-primary-glass" onclick="confirmarEliminar()">
                    <i class="bi bi-person-dash"></i>Desactivar
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "http://localhost:7000";
    const token = localStorage.getItem("token");
    const rol = localStorage.getItem("rol");

    if (!token) window.location.href = "/index.html";
    if (rol !== "ADMIN") window.location.href = "/dashboard.html";

    let usuarioIdEliminar = null;
    let modoEdicion = false;

    async function cargarUsuarios() {
        try {
            const soloActivos = document.getElementById("toggleActivos").checked;
            const url = soloActivos ? `${API_URL}/usuarios` : `${API_URL}/usuarios/todos`;

            const response = await fetch(url, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const usuarios = await response.json();
            renderTabla(usuarios);
        } catch (error) {
            const tbody = document.getElementById("tablaUsuarios");
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" style="text-align:center;color:var(--ink-light);padding:2rem;">
                        <i class="bi bi-wifi-off fs-4 d-block mb-2"></i>
                        Sin conexión — los usuarios no están disponibles offline
                    </td>
                </tr>`;
        }
    }

    function renderTabla(usuarios) {
        const tbody = document.getElementById("tablaUsuarios");
        if (usuarios.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--ink-light);padding:2rem;">No hay usuarios registrados</td></tr>`;
            return;
        }

        tbody.innerHTML = usuarios.map(u => `
            <tr class="${!u.activo ? 'fila-inactiva' : ''}">
                <td>
                    ${u.nombre}
                    ${!u.activo ? '<span class="badge-inactivo">Inactivo</span>' : ''}
                </td>
                <td class="d-none d-md-table-cell">${u.apellido}</td>
                <td class="d-none d-md-table-cell">${u.email}</td>
                <td>
                    <span class="badge-rol ${u.rol === 'ADMIN' ? 'badge-admin-rol' : 'badge-encuestador-rol'}">
                        ${u.rol}
                    </span>
                </td>
                <td style="text-align:right">
                    <div class="dropdown">
                        <button class="btn-tres-puntos dropdown-toggle-split"
                                data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-glass dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" href="#"
                                   onclick="abrirPanelEditar(${JSON.stringify(u).replace(/"/g, '&quot;')})">
                                    <i class="bi bi-pencil me-2"></i>Editar
                                </a>
                            </li>
                            ${u.rol !== 'ADMIN' ? `
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item text-danger-glass" href="#"
                                   onclick="${u.activo ? `abrirModalEliminar('${u.id}')` : `activarUsuario('${u.id}')`}">
                                    <i class="bi ${u.activo ? 'bi-person-dash' : 'bi-person-check'} me-2"></i>
                                    ${u.activo ? 'Desactivar' : 'Activar'}
                                </a>
                            </li>` : ''}
                        </ul>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function abrirPanelCrear() {
        modoEdicion = false;
        document.getElementById("tituloPanel").textContent = "Nuevo usuario";
        document.getElementById("usuarioId").value = "";
        document.getElementById("nombre").value = "";
        document.getElementById("apellido").value = "";
        document.getElementById("emailUsuario").value = "";
        document.getElementById("passwordUsuario").value = "";
        document.getElementById("rolUsuario").value = "ENCUESTADOR";
        document.getElementById("rolUsuario").disabled = false;
        new bootstrap.Offcanvas(document.getElementById("panelUsuario")).show();
    }

    function abrirPanelEditar(usuario) {
        modoEdicion = true;
        document.getElementById("tituloPanel").textContent = "Editar usuario";
        document.getElementById("usuarioId").value = usuario.id;
        document.getElementById("nombre").value = usuario.nombre;
        document.getElementById("apellido").value = usuario.apellido;
        document.getElementById("emailUsuario").value = usuario.email;
        document.getElementById("passwordUsuario").value = "";
        document.getElementById("rolUsuario").value = usuario.rol;
        document.getElementById("rolUsuario").disabled = usuario.rol === "ADMIN";
        document.getElementById("activoUsuario").value = usuario.activo;
        new bootstrap.Offcanvas(document.getElementById("panelUsuario")).show();
    }

    async function guardarUsuario() {
        const id = document.getElementById("usuarioId").value;
        const usuario = {
            nombre: document.getElementById("nombre").value,
            apellido: document.getElementById("apellido").value,
            email: document.getElementById("emailUsuario").value,
            password: document.getElementById("passwordUsuario").value,
            rol: document.getElementById("rolUsuario").value,
            activo: document.getElementById("activoUsuario").value === "true"
        };

        try {
            const url = modoEdicion ? `${API_URL}/usuarios/${id}` : `${API_URL}/usuarios`;
            const method = modoEdicion ? "PUT" : "POST";

            const response = await fetch(url, {
                method,
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify(usuario)
            });

            if (!response.ok) {
                const error = await response.text();
                mostrarError(error);
                return;
            }

            bootstrap.Offcanvas.getInstance(document.getElementById("panelUsuario")).hide();
            mostrarExito(modoEdicion ? "Usuario actualizado exitosamente" : "Usuario creado exitosamente");
            cargarUsuarios();

        } catch (error) {
            mostrarError("Error al guardar usuario");
        }
    }

    async function activarUsuario(id) {
        try {
            const response = await fetch(`${API_URL}/usuarios/${id}/activar`, {
                method: "PUT",
                headers: { "Authorization": `Bearer ${token}` }
            });

            if (!response.ok) {
                const error = await response.text();
                mostrarError(error);
                return;
            }

            mostrarExito("Usuario activado exitosamente");
            cargarUsuarios();

        } catch (error) {
            mostrarError("Error al activar usuario");
        }
    }

    function abrirModalEliminar(id) {
        usuarioIdEliminar = id;
        new bootstrap.Modal(document.getElementById("modalEliminar")).show();
    }

    async function confirmarEliminar() {
        try {
            const response = await fetch(`${API_URL}/usuarios/${usuarioIdEliminar}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });

            if (!response.ok) {
                const error = await response.text();
                mostrarError(error);
                return;
            }

            bootstrap.Modal.getInstance(document.getElementById("modalEliminar")).hide();
            mostrarExito("Usuario desactivado exitosamente");
            cargarUsuarios();

        } catch (error) {
            mostrarError("Error al desactivar usuario");
        }
    }

    function mostrarError(mensaje) {
        const alerta = document.getElementById("alerta");
        document.getElementById("mensajeAlerta").textContent = mensaje;
        alerta.classList.remove("d-none");
        setTimeout(() => alerta.classList.add("d-none"), 4000);
    }

    function mostrarExito(mensaje) {
        const alerta = document.getElementById("alertaExito");
        document.getElementById("mensajeExito").textContent = mensaje;
        alerta.classList.remove("d-none");
        setTimeout(() => alerta.classList.add("d-none"), 4000);
    }

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = "/index.html";
    }

    cargarUsuarios();
</script>
</body>
</html>
