<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/db.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuestas PUCMM - Mis Encuestas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <script src="/js/base.js"></script>
    <style>
        :root {
            --cream: #FAF8F4;
            --ink: #1A1714;
            --ink-light: #6B6560;
            --ink-lighter: #B8B3AE;
            --accent: #2B5BDB;
            --accent-light: #E8EEFF;
            --accent-dark: #1A3A9E;
            --success: #1A7A4A;
            --success-bg: #E8F5EE;
            --warning: #B85C00;
            --warning-bg: #FFF3E8;
            --danger: #A32D2D;
            --danger-bg: #FCEBEB;
            --border: #E5E1DB;
            --surface: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
        }

        .app-shell { display: flex; min-height: 100vh; }

        .sidebar {
            width: 220px;
            background: var(--ink);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 100;
        }

        .main {
            flex: 1;
            margin-left: 220px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            background: var(--surface);
            border-bottom: 0.5px solid var(--border);
            padding: 0.85rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title { font-size: 16px; font-weight: 600; color: var(--ink); }
        .topbar-sub   { font-size: 12px; color: var(--ink-light); }
        .topbar-actions { display: flex; align-items: center; gap: 8px; }

        .page-body { padding: 1.5rem; }

        .alert-glass-danger {
            background: var(--danger-bg);
            border: 0.5px solid rgba(163,45,45,0.25);
            color: var(--danger);
            border-radius: 8px;
            font-size: 13px;
            padding: 10px 14px;
        }

        .alert-glass-success {
            background: var(--success-bg);
            border: 0.5px solid rgba(26,122,74,0.25);
            color: var(--success);
            border-radius: 8px;
            font-size: 13px;
            padding: 10px 14px;
        }

        .btn-primary-glass {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background .2s;
            white-space: nowrap;
            text-decoration: none;
        }

        .btn-primary-glass:hover { background: var(--accent-dark); color: white; }

        .btn-danger-glass {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--danger-bg);
            color: var(--danger);
            border: 0.5px solid rgba(163,45,45,0.2);
            border-radius: 8px;
            padding: 9px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background .2s;
        }

        .btn-danger-glass:hover { background: #F7C1C1; }

        .btn-secondary-glass {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            color: var(--ink);
            border: 0.5px solid var(--border);
            border-radius: 8px;
            padding: 9px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background .2s;
            text-decoration: none;
        }

        .btn-secondary-glass:hover { background: var(--cream); color: var(--ink); }

        .btn-logout {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(163,45,45,0.08);
            border: 0.5px solid rgba(163,45,45,0.2);
            color: var(--danger);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background .2s;
        }

        .btn-logout:hover { background: var(--danger-bg); }

        .table-wrap {
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: 10px;
            overflow: visible;
        }

        .table-responsive {
            overflow-x: auto;
            overflow-y: visible;
        }

        .table-glass {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
        }

        .table-glass thead th {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--ink-light);
            font-weight: 500;
            padding: 10px 16px;
            background: var(--cream);
            border-bottom: 0.5px solid var(--border);
            text-align: left;
        }

        .table-glass thead tr th:first-child { border-radius: 10px 0 0 0; }
        .table-glass thead tr th:last-child  { border-radius: 0 10px 0 0; }

        .table-glass tbody td {
            padding: 11px 16px;
            border-bottom: 0.5px solid var(--border);
            color: var(--ink) !important;
            font-size: 13px;
            background: transparent !important;
            vertical-align: middle;
        }

        .table-glass tbody tr:last-child td { border-bottom: none; }
        .table-glass tbody tr:hover td { background: #F7F5F1 !important; }

        .badge-sync {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 0.3px;
        }

        .badge-sincronizado { background: var(--success-bg); color: var(--success); }
        .badge-pendiente    { background: var(--warning-bg); color: var(--warning); }

        .btn-tres-puntos {
            background: transparent;
            border: 0.5px solid var(--border);
            color: var(--ink-light);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            transition: all .15s;
            font-size: 14px;
        }

        .btn-tres-puntos:hover { background: var(--cream); color: var(--ink); }

        .dropdown-menu-glass {
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: 10px;
            padding: 6px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .dropdown-menu-glass .dropdown-item {
            color: var(--ink);
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 13px;
            transition: background .15s;
        }

        .dropdown-menu-glass .dropdown-item:hover { background: var(--cream); color: var(--ink); }
        .dropdown-menu-glass .dropdown-item.text-danger-glass { color: var(--danger); }
        .dropdown-menu-glass .dropdown-item.text-danger-glass:hover { background: var(--danger-bg); }
        .dropdown-menu-glass .dropdown-divider { border-color: var(--border); margin: 4px 0; }

        .modal-glass .modal-content {
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: 12px;
            color: var(--ink);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        .modal-glass .modal-header { border-bottom: 0.5px solid var(--border); padding: 1.25rem 1.5rem; }
        .modal-glass .modal-footer { border-top: 0.5px solid var(--border); padding: 1rem 1.5rem; }
        .modal-glass .modal-title { font-size: 15px; font-weight: 600; color: var(--ink); }
        .modal-glass .modal-body p { font-size: 13px; color: var(--ink-light); }
        .btn-close { filter: none !important; opacity: 0.4; }
        .btn-close:hover { opacity: 0.8; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
        }
    </style>
</head>
<body>

<div class="app-shell">

    <div class="sidebar"></div>

    <div class="main">

        <div class="topbar">
            <div>
                <div class="topbar-title">Mis encuestas</div>
                <div class="topbar-sub">Encuestas registradas en campo</div>
            </div>
            <div class="topbar-actions">
                <a href="/formulario.html" class="btn-primary-glass">
                    <i class="bi bi-plus-lg"></i>Nueva encuesta
                </a>
                <button class="btn-logout" onclick="cerrarSesion()">
                    <i class="bi bi-box-arrow-right"></i>Salir
                </button>
            </div>
        </div>

        <div class="page-body">

            <div id="alerta" class="alert-glass-danger d-none mb-3">
                <i class="bi bi-exclamation-circle me-2"></i>
                <span id="mensajeAlerta"></span>
            </div>
            <div id="alertaExito" class="alert-glass-success d-none mb-3">
                <i class="bi bi-check-circle me-2"></i>
                <span id="mensajeExito"></span>
            </div>

            <div class="table-wrap">
                <div class="table-responsive">
                    <table class="table-glass">
                        <thead>
                        <tr>
                            <th>Nombre</th>
                            <th class="d-none d-md-table-cell">Cédula</th>
                            <th class="d-none d-md-table-cell">Sector</th>
                            <th class="d-none d-md-table-cell">Nivel educativo</th>
                            <th>Estado</th>
                            <th style="text-align:right">Acciones</th>
                        </tr>
                        </thead>
                        <tbody id="tablaEncuestas">
                        <tr>
                            <td colspan="6" style="text-align:center;color:var(--ink-light);padding:2rem;">
                                <span class="spinner-border spinner-border-sm me-2"></span>
                                Cargando...
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Modal Confirmar Eliminar -->
<div class="modal fade modal-glass" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirmar eliminación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>¿Estás seguro que deseas eliminar esta encuesta? Esta acción no se puede deshacer.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary-glass" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn-danger-glass" onclick="confirmarEliminar()">
                    <i class="bi bi-trash"></i>Eliminar
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "http://localhost:7000";
    const token = localStorage.getItem("token");
    const email = localStorage.getItem("email");
    const userId = localStorage.getItem("userId");

    if (!token) window.location.href = "/index.html";

    let encuestaIdEliminar = null;

    async function cargarEncuestas() {
        try {
            let encuestas = [];

            if (estaOnline()) {
                const response = await fetch(`${API_URL}/encuestas`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                encuestas = await response.json();
            }

            await inicializarDB();
            const locales = await obtenerEncuestasLocales();
            const localesPendientes = locales.filter(l => !l.sincronizado);
            encuestas = [...encuestas, ...localesPendientes];

            renderTabla(encuestas);
        } catch (error) {
            await inicializarDB();
            const locales = await obtenerEncuestasLocales();
            renderTabla(locales);
        }
    }

    function renderTabla(encuestas) {
        const tbody = document.getElementById("tablaEncuestas");
        if (encuestas.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6" style="text-align:center;color:var(--ink-light);padding:2rem;">
                        No hay encuestas registradas
                    </td>
                </tr>`;
            return;
        }

        tbody.innerHTML = encuestas.map(e => `
            <tr>
                <td>${e.nombreEncuestado} ${e.apellidoEncuestado}</td>
                <td class="d-none d-md-table-cell">${e.cedula || '-'}</td>
                <td class="d-none d-md-table-cell">${e.sector}</td>
                <td class="d-none d-md-table-cell">${e.educacion}</td>
                <td>
                    <span class="badge-sync ${e.sincronizado ? 'badge-sincronizado' : 'badge-pendiente'}">
                        ${e.sincronizado ? 'Sincronizado' : 'Pendiente'}
                    </span>
                </td>
                <td style="text-align:right">
                    <div class="dropdown">
                        <button class="btn-tres-puntos"
                                data-bs-toggle="dropdown"
                                data-bs-auto-close="true"
                                data-bs-popper="fixed">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-glass dropdown-menu-end">
                            ${!e.sincronizado ? `
                            <li>
                                <a class="dropdown-item" href="/formulario.html?id=${e.id}">
                                    <i class="bi bi-pencil me-2"></i>Editar
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item text-danger-glass" href="#"
                                   onclick="abrirModalEliminar('${e.id}')">
                                    <i class="bi bi-trash me-2"></i>Eliminar
                                </a>
                            </li>` : `
                            <li>
                                <span class="dropdown-item" style="color:var(--ink-lighter);cursor:default;">
                                    <i class="bi bi-lock me-2"></i>Solo lectura
                                </span>
                            </li>`}
                        </ul>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function abrirModalEliminar(id) {
        encuestaIdEliminar = id;
        new bootstrap.Modal(document.getElementById("modalEliminar")).show();
    }

    async function confirmarEliminar() {
        const esLocal = typeof encuestaIdEliminar === "number" ||
            !isNaN(encuestaIdEliminar);

        if (!estaOnline() || esLocal) {
            await eliminarEncuestaLocal(Number(encuestaIdEliminar));
            bootstrap.Modal.getInstance(document.getElementById("modalEliminar")).hide();
            mostrarExito("Encuesta eliminada localmente");
            cargarEncuestas();
            return;
        }

        try {
            const response = await fetch(`${API_URL}/encuestas/${encuestaIdEliminar}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });

            if (!response.ok) {
                const error = await response.text();
                mostrarError(error);
                return;
            }

            bootstrap.Modal.getInstance(document.getElementById("modalEliminar")).hide();
            mostrarExito("Encuesta eliminada exitosamente");
            cargarEncuestas();

        } catch (error) {
            mostrarError("Error al eliminar encuesta");
        }
    }

    function mostrarError(mensaje) {
        const alerta = document.getElementById("alerta");
        document.getElementById("mensajeAlerta").textContent = mensaje;
        alerta.classList.remove("d-none");
        setTimeout(() => alerta.classList.add("d-none"), 4000);
    }

    function mostrarExito(mensaje) {
        const alerta = document.getElementById("alertaExito");
        document.getElementById("mensajeExito").textContent = mensaje;
        alerta.classList.remove("d-none");
        setTimeout(() => alerta.classList.add("d-none"), 4000);
    }

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = "/index.html";
    }

    window.addEventListener("online", async () => {
        mostrarExito("Conexión restaurada - Sincronizando...");
        await sincronizarPendientes();
    });

    async function sincronizarPendientes() {
        await inicializarDB();
        const pendientes = await obtenerEncuestasPendientes();

        if (pendientes.length === 0) return;

        let sincronizadas = 0;
        for (const encuesta of pendientes) {
            try {
                const encuestaServidor = {
                    nombreEncuestado: encuesta.nombreEncuestado,
                    apellidoEncuestado: encuesta.apellidoEncuestado,
                    cedula: encuesta.cedula,
                    sector: encuesta.sector,
                    educacion: encuesta.educacion,
                    fotoBase64: encuesta.fotoBase64,
                    ubicacion: encuesta.ubicacion,
                    sincronizado: true
                };
                const response = await fetch(`${API_URL}/encuestas`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(encuestaServidor)
                });

                if (response.ok) {
                    await eliminarEncuestaLocal(encuesta.id);
                    sincronizadas++;
                }
            } catch (error) {
                console.error("Error sincronizando encuesta:", error);
            }
        }

        if (sincronizadas > 0) {
            mostrarExito(`${sincronizadas} encuesta(s) sincronizada(s) exitosamente`);
            cargarEncuestas();
        }
    }

    async function iniciar() {
        await inicializarDB();
        if (estaOnline()) {
            await sincronizarPendientes();
        }
        cargarEncuestas();
    }

    iniciar();
</script>
</body>
</html>
