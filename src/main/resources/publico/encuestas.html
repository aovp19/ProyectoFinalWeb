<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuestas PUCMM - Mis Encuestas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <style>
        .contenido { position: relative; z-index: 1; padding: 2rem; }

        .card-acceso {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .card-acceso {
            overflow: visible !important;
        }

        .table-responsive {
            overflow-x: auto;
            overflow-y: visible !important;
        }

        .offcanvas {
            background: #1e1b4b !important;
            border-left: 1px solid rgba(255, 255, 255, 0.15) !important;
        }

        .offcanvas-title { color: white; font-weight: 600; }
        .offcanvas-header { border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-close { filter: invert(1); }

        .modal-glass .modal-content {
            background: #1e1b4b;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: white;
        }

        .modal-glass .modal-header { border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .modal-glass .modal-footer { border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-close { filter: invert(1); }

        .table-glass > tbody > tr > td {
            background-color: transparent !important;
            color: white !important;
        }

        .table-glass > tbody > tr {
            background-color: transparent !important;
        }

        .dropdown-menu-glass {
            background: #1e1b4b;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 6px;
        }

        .dropdown-menu-glass .dropdown-item {
            color: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .dropdown-menu-glass .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .dropdown-menu-glass .dropdown-item.text-danger-glass { color: #ff8fa3; }
        .dropdown-menu-glass .dropdown-item.text-danger-glass:hover {
            background: rgba(255, 100, 100, 0.15);
        }

        .dropdown-menu-glass .dropdown-divider {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn-tres-puntos {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 8px;
            padding: 4px 10px;
            transition: all 0.2s;
        }

        .btn-tres-puntos:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .badge-sync {
            font-size: 0.75rem;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 8px;
        }

        .badge-sincronizado {
            background: rgba(40, 200, 120, 0.2);
            border: 1px solid rgba(40, 200, 120, 0.4);
            color: #6fffc0;
        }

        .badge-pendiente {
            background: rgba(247, 186, 47, 0.2);
            border: 1px solid rgba(247, 186, 47, 0.4);
            color: #f7d96f;
        }

        /* Preview foto */
        #previewFoto {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: none;
        }

        .zona-foto {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .zona-foto:hover {
            border-color: rgba(123, 47, 247, 0.6);
            background: rgba(123, 47, 247, 0.05);
        }
    </style>
</head>
<body>

<div class="burbujas">
    <div class="burbuja"></div>
    <div class="burbuja"></div>
    <div class="burbuja"></div>
    <div class="burbuja"></div>
    <div class="burbuja"></div>
</div>

<!-- Navbar -->
<nav class="navbar-glass d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-3">
        <a href="/dashboard.html" class="text-white text-decoration-none">
            <i class="bi bi-arrow-left fs-5"></i>
        </a>
        <i class="bi bi-clipboard-check fs-4"></i>
        <span class="navbar-brand mb-0">Mis Encuestas</span>
    </div>
    <button class="btn-logout" onclick="cerrarSesion()">
        <i class="bi bi-box-arrow-right me-1"></i>Salir
    </button>
</nav>

<div class="contenido">

    <!-- Alertas -->
    <div id="alerta" class="alert alert-glass-danger d-none mb-3">
        <i class="bi bi-exclamation-circle me-2"></i>
        <span id="mensajeAlerta"></span>
    </div>
    <div id="alertaExito" class="alert alert-glass-success d-none mb-3">
        <i class="bi bi-check-circle me-2"></i>
        <span id="mensajeExito"></span>
    </div>

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h4 class="mb-0">Encuestas registradas</h4>
        <button class="btn-primary-glass" onclick="abrirPanelCrear()">
            <i class="bi bi-plus-lg me-2"></i>Nueva Encuesta
        </button>
    </div>

    <!-- Tabla -->
    <div class="card-acceso">
        <div class="table-responsive">
            <table class="table table-glass mb-0">
                <thead>
                <tr>
                    <th>Nombre</th>
                    <th class="d-none d-md-table-cell">Sector</th>
                    <th class="d-none d-md-table-cell">Nivel</th>
                    <th>Estado</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody id="tablaEncuestas">
                <tr>
                    <td colspan="5" class="text-center text-white-50">
                        <span class="spinner-border spinner-border-sm me-2"></span>
                        Cargando...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Offcanvas Crear/Editar -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="panelEncuesta">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="tituloPanel">Nueva Encuesta</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <input type="hidden" id="encuestaId">
        <div class="mb-3">
            <label class="form-label">Nombre del encuestado</label>
            <input type="text" class="form-control" id="nombreEncuestado" placeholder="Nombre">
        </div>
        <div class="mb-3">
            <label class="form-label">Apellido del encuestado</label>
            <input type="text" class="form-control" id="apellidoEncuestado" placeholder="Apellido">
        </div>
        <div class="mb-3">
            <label class="form-label">Sector</label>
            <input type="text" class="form-control" id="sector" placeholder="Sector">
        </div>
        <div class="mb-3">
            <label class="form-label">Nivel educativo</label>
            <select class="form-select" id="educacion">
                <option value="BASICO">Básico</option>
                <option value="MEDIO">Medio</option>
                <option value="UNIVERSITARIO">Grado Universitario</option>
                <option value="POSTGRADO">Postgrado</option>
                <option value="DOCTORADO">Doctorado</option>
            </select>
        </div>

        <!-- Foto -->
        <div class="mb-3">
            <label class="form-label">Foto</label>

            <!-- Tabs para elegir método -->
            <div class="d-flex gap-2 mb-2">
                <button type="button" class="btn-primary-glass flex-fill" onclick="mostrarCamara()">
                    <i class="bi bi-camera me-2"></i>Cámara
                </button>
                <button type="button" class="btn-primary-glass flex-fill" onclick="mostrarExplorador()">
                    <i class="bi bi-upload me-2"></i>Subir foto
                </button>
            </div>

            <!-- Cámara web -->
            <div id="seccionCamara" style="display:none">
                <div style="position:relative; border-radius:12px; overflow:hidden;">
                    <video id="webcam" autoplay playsinline
                           style="width:100%; border-radius:12px;"></video>
                    <canvas id="canvas" style="display:none;"></canvas>
                </div>
                <div class="d-flex gap-2 mt-2">
                    <button type="button" class="btn-primary-glass flex-fill" onclick="tomarFoto()">
                        <i class="bi bi-camera-fill me-2"></i>Tomar foto
                    </button>
                    <button type="button" class="btn-danger-glass" onclick="cerrarCamara()">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Procesador de archivos -->
            <input type="file" id="inputFoto" accept="image/*" capture="environment"
                       class="d-none" onchange="procesarFoto(this)">


            <!-- Preview -->
            <img id="previewFoto" src="" alt="Preview"
                 style="width:100%; border-radius:12px; margin-top:8px; display:none;">
        </div>

        <!-- Ubicacion -->
        <div class="mb-3">
            <label class="form-label">Ubicación</label>
            <div class="d-flex gap-2">
                <input type="text" class="form-control" id="latitud" placeholder="Latitud" readonly>
                <input type="text" class="form-control" id="longitud" placeholder="Longitud" readonly>
            </div>
            <button class="btn-primary-glass w-100 mt-2" onclick="obtenerUbicacion()">
                <i class="bi bi-geo-alt me-2"></i>Obtener ubicación
            </button>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn-primary-glass w-100" onclick="guardarEncuesta()">
                <i class="bi bi-save me-2"></i>Guardar
            </button>
            <button class="btn-danger-glass" data-bs-dismiss="offcanvas">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>
</div>

<!-- Modal Confirmar Eliminar -->
<div class="modal fade modal-glass" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirmar eliminación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-white-50">¿Estás seguro que deseas eliminar esta encuesta?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-danger-glass" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn-primary-glass" onclick="confirmarEliminar()">
                    <i class="bi bi-trash me-2"></i>Eliminar
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "http://localhost:7000";
    const token = localStorage.getItem("token");
    const email = localStorage.getItem("email");
    const userId = localStorage.getItem("userId");

    if (!token) window.location.href = "/index.html";

    let encuestaIdEliminar = null;
    let modoEdicion = false;
    let fotoBase64 = null;

    async function cargarEncuestas() {
        try {
            const response = await fetch(`${API_URL}/encuestas`, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const encuestas = await response.json();
            renderTabla(encuestas);
        } catch (error) {
            mostrarError("Error al cargar encuestas");
        }
    }

    function renderTabla(encuestas) {
        const tbody = document.getElementById("tablaEncuestas");
        if (encuestas.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-white-50">No hay encuestas registradas</td></tr>`;
            return;
        }

        tbody.innerHTML = encuestas.map(e => `
            <tr>
                <td>${e.nombreEncuestado} ${e.apellidoEncuestado}</td>
                <td class="d-none d-md-table-cell">${e.sector}</td>
                <td class="d-none d-md-table-cell">${e.educacion}</td>
                <td>
                    <span class="badge-sync ${e.sincronizado ? 'badge-sincronizado' : 'badge-pendiente'}">
                        ${e.sincronizado ? 'Sincronizado' : 'Pendiente'}
                    </span>
                </td>
                <td class="text-end">
                    <div class="dropdown">
                        <button class="btn-tres-puntos"
                                data-bs-toggle="dropdown"
                                data-bs-auto-close="true"
                                data-bs-popper="fixed">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-glass dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" href="#"
                                   onclick="abrirPanelEditar(${JSON.stringify(e).replace(/"/g, '&quot;')})">
                                    <i class="bi bi-pencil me-2"></i>Editar
                                </a>
                            </li>
                            ${!e.sincronizado ? `
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item text-danger-glass" href="#"
                                   onclick="abrirModalEliminar('${e.id}')">
                                    <i class="bi bi-trash me-2"></i>Eliminar
                                </a>
                            </li>` : ''}
                        </ul>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function abrirPanelCrear() {
        modoEdicion = false;
        fotoBase64 = null;
        document.getElementById("tituloPanel").textContent = "Nueva Encuesta";
        document.getElementById("encuestaId").value = "";
        document.getElementById("nombreEncuestado").value = "";
        document.getElementById("apellidoEncuestado").value = "";
        document.getElementById("sector").value = "";
        document.getElementById("educacion").value = "BASICO";
        document.getElementById("latitud").value = "";
        document.getElementById("longitud").value = "";
        document.getElementById("previewFoto").style.display = "none";
        new bootstrap.Offcanvas(document.getElementById("panelEncuesta")).show();
    }

    function abrirPanelEditar(encuesta) {
        modoEdicion = true;
        fotoBase64 = encuesta.fotoBase64 || null;
        document.getElementById("tituloPanel").textContent = "Editar Encuesta";
        document.getElementById("encuestaId").value = encuesta.id;
        document.getElementById("nombreEncuestado").value = encuesta.nombreEncuestado;
        document.getElementById("apellidoEncuestado").value = encuesta.apellidoEncuestado;
        document.getElementById("sector").value = encuesta.sector;
        document.getElementById("educacion").value = encuesta.educacion;
        document.getElementById("latitud").value = encuesta.ubicacion?.latitud || "";
        document.getElementById("longitud").value = encuesta.ubicacion?.longitud || "";

        if (encuesta.fotoBase64) {
            const preview = document.getElementById("previewFoto");
            preview.src = `data:image/jpeg;base64,${encuesta.fotoBase64}`;
            preview.style.display = "block";
        }

        new bootstrap.Offcanvas(document.getElementById("panelEncuesta")).show();
    }

    async function guardarEncuesta() {
        const id = document.getElementById("encuestaId").value;
        const latitud = document.getElementById("latitud").value;
        const longitud = document.getElementById("longitud").value;

        const encuesta = {
            nombreEncuestado: document.getElementById("nombreEncuestado").value,
            apellidoEncuestado: document.getElementById("apellidoEncuestado").value,
            sector: document.getElementById("sector").value,
            educacion: document.getElementById("educacion").value,
            fotoBase64: fotoBase64,
            sincronizado: false,
            ubicacion: latitud && longitud ? {
                latitud: parseFloat(latitud),
                longitud: parseFloat(longitud)
            } : null
        };

        try {
            const url = modoEdicion ? `${API_URL}/encuestas/${id}` : `${API_URL}/encuestas`;
            const method = modoEdicion ? "PUT" : "POST";

            const response = await fetch(url, {
                method,
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify(encuesta)
            });

            if (!response.ok) {
                const error = await response.text();
                mostrarError(error);
                return;
            }

            bootstrap.Offcanvas.getInstance(document.getElementById("panelEncuesta")).hide();
            mostrarExito(modoEdicion ? "Encuesta actualizada exitosamente" : "Encuesta creada exitosamente");

            // Cerrar cámara cuando se cierra el offcanvas
            document.getElementById("panelEncuesta").addEventListener("hide.bs.offcanvas", () => {
                cerrarCamara();
            });
            cargarEncuestas();

        } catch (error) {
            mostrarError("Error al guardar encuesta");
        }
    }

    function procesarFoto(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            fotoBase64 = e.target.result.split(",")[1];
            const preview = document.getElementById("previewFoto");
            preview.src = e.target.result;
            preview.style.display = "block";
        };
        reader.readAsDataURL(file);
    }

    let webcam = null;

    function mostrarCamara() {
        document.getElementById("seccionCamara").style.display = "block";

        const videoEl = document.getElementById("webcam");
        webcam = new Webcam(videoEl, "user", document.getElementById("canvas"));
        webcam.start()
            .then(() => console.log("Cámara iniciada"))
            .catch(err => mostrarError("No se pudo acceder a la cámara: " + err));
    }

    function cerrarCamara() {
        if (webcam) {
            webcam.stop();
            webcam = null;
        }
        document.getElementById("seccionCamara").style.display = "none";
    }

    function mostrarExplorador() {
        cerrarCamara();
        document.getElementById("inputFoto").click();
    }

    function tomarFoto() {
        if (!webcam) return;
        const picture = webcam.snap();
        fotoBase64 = picture.split(",")[1];
        const preview = document.getElementById("previewFoto");
        preview.src = picture;
        preview.style.display = "block";
        mostrarExito("Foto tomada exitosamente");
    }

    function obtenerUbicacion() {
        if (!navigator.geolocation) {
            mostrarError("Tu dispositivo no soporta geolocalización");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                document.getElementById("latitud").value = pos.coords.latitude;
                document.getElementById("longitud").value = pos.coords.longitude;
                mostrarExito("Ubicación obtenida exitosamente");
            },
            (err) => {
                mostrarError("No se pudo obtener la ubicación");
            }
        );
    }

    function abrirModalEliminar(id) {
        encuestaIdEliminar = id;
        new bootstrap.Modal(document.getElementById("modalEliminar")).show();
    }

    async function confirmarEliminar() {
        try {
            const response = await fetch(`${API_URL}/encuestas/${encuestaIdEliminar}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });

            if (!response.ok) {
                const error = await response.text();
                mostrarError(error);
                return;
            }

            bootstrap.Modal.getInstance(document.getElementById("modalEliminar")).hide();
            mostrarExito("Encuesta eliminada exitosamente");
            cargarEncuestas();

        } catch (error) {
            mostrarError("Error al eliminar encuesta");
        }
    }

    function mostrarError(mensaje) {
        const alerta = document.getElementById("alerta");
        document.getElementById("mensajeAlerta").textContent = mensaje;
        alerta.classList.remove("d-none");
        setTimeout(() => alerta.classList.add("d-none"), 4000);
    }

    function mostrarExito(mensaje) {
        const alerta = document.getElementById("alertaExito");
        document.getElementById("mensajeExito").textContent = mensaje;
        alerta.classList.remove("d-none");
        setTimeout(() => alerta.classList.add("d-none"), 4000);
    }

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = "/index.html";
    }

    cargarEncuestas();
</script>
<script src="https://unpkg.com/webcam-easy/dist/webcam-easy.min.js"></script>
</body>
</html>
