<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuestas PUCMM - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Burbujas animadas de fondo */
        .burbujas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .burbuja {
            position: absolute;
            bottom: -150px;
            border-radius: 50%;
            animation: flotar 8s infinite ease-in;
            opacity: 0.15;
        }

        .burbuja:nth-child(1) { width: 80px; height: 80px; left: 10%; background: #7b2ff7; animation-duration: 7s; }
        .burbuja:nth-child(2) { width: 120px; height: 120px; left: 25%; background: #4a90d9; animation-duration: 10s; animation-delay: 1s; }
        .burbuja:nth-child(3) { width: 60px; height: 60px; left: 50%; background: #a855f7; animation-duration: 8s; animation-delay: 2s; }
        .burbuja:nth-child(4) { width: 100px; height: 100px; left: 70%; background: #3b82f6; animation-duration: 12s; animation-delay: 0.5s; }
        .burbuja:nth-child(5) { width: 50px; height: 50px; left: 85%; background: #8b5cf6; animation-duration: 9s; animation-delay: 3s; }

        @keyframes flotar {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.15; }
            100% { transform: translateY(-110vh) rotate(720deg); opacity: 0; }
        }

        /* Tarjeta glassmorphism */
        .glass-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #7b2ff7, #4a90d9);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: white;
            box-shadow: 0 8px 20px rgba(123, 47, 247, 0.4);
        }

        h4 {
            color: white;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .subtitulo {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.6);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #7b2ff7;
            box-shadow: 0 0 0 3px rgba(123, 47, 247, 0.25);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-login {
            background: linear-gradient(135deg, #7b2ff7, #4a90d9);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(123, 47, 247, 0.5);
            color: white;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert-custom {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.4);
            color: #ff8fa3;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .divider {
            border-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

<!-- Burbujas de fondo -->
<div class="burbujas">
    <div class="burbuja"></div>
    <div class="burbuja"></div>
    <div class="burbuja"></div>
    <div class="burbuja"></div>
    <div class="burbuja"></div>
</div>

<!-- Tarjeta de login -->
<div class="glass-card mx-3">
    <div class="text-center mb-4">
        <div class="logo-icon">
            <i class="bi bi-clipboard-data-fill"></i>
        </div>
        <h4>Encuestas PUCMM</h4>
        <p class="subtitulo">Oficina de Planeamiento</p>
    </div>

    <div id="alerta" class="alert alert-custom d-none mb-3" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>
        <span id="mensajeAlerta"></span>
    </div>

    <form id="formLogin">
        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                <input type="email" class="form-control" id="email"
                       placeholder="correo@pucmm.edu.do" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Contraseña</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control" id="password"
                       placeholder="••••••••" required>
                <button class="input-group-text" type="button" id="togglePassword"
                        style="cursor:pointer; border-left: none;">
                    <i class="bi bi-eye-fill" id="iconoOjo"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-login w-100" id="btnLogin">
            <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "http://localhost:7000";

    // Toggle mostrar/ocultar contraseña
    document.getElementById("togglePassword").addEventListener("click", () => {
        const input = document.getElementById("password");
        const icono = document.getElementById("iconoOjo");
        if (input.type === "password") {
            input.type = "text";
            icono.className = "bi bi-eye-slash-fill";
        } else {
            input.type = "password";
            icono.className = "bi bi-eye-fill";
        }
    });

    document.getElementById("formLogin").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const btn = document.getElementById("btnLogin");

        // Deshabilitar botón mientras carga
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verificando...';

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            if (!response.ok) {
                const error = await response.text();
                mostrarAlerta(error);
                return;
            }

            const data = await response.json();
            localStorage.setItem("token", data.token);
            localStorage.setItem("email", email);
            localStorage.setItem("rol", data.rol);
            window.location.href = "/dashboard.html";

        } catch (error) {
            mostrarAlerta("Error al conectar con el servidor");
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión';
        }
    });

    function mostrarAlerta(mensaje) {
        const alerta = document.getElementById("alerta");
        const mensajeAlerta = document.getElementById("mensajeAlerta");
        mensajeAlerta.textContent = mensaje;
        alerta.classList.remove("d-none");
    }
</script>
</body>
</html>
