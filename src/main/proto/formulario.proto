syntax = "proto3";

option java_package = "com.pucmm.csti19105488.grpc";
option java_outer_classname = "FormularioProto";

// Define los métodos remotos disponibles esto equivale a los endpoints de una API REST
// pero usando el protocolo gRPC
service FormularioService {
  rpc ListarFormularios (ListarRequest) returns (ListarResponse);
  rpc CrearFormulario (FormularioRequest) returns (FormularioResponse);
}

message ListarRequest {
  string usuario_id = 1;
}

// Lo que el servidor devuelve al listar contiene una lista de formularios
message ListarResponse {
  repeated FormularioMessage formularios = 1;
}

// ESTRUCTURA DE DATOS
// Representa un formulario individual dentro de la lista de respuesta
// Cada campo tiene un número único (= 1, = 2...) esto es el identificador
// binario en el protocolo Protobuf, NO es un orden ni un índice
message FormularioMessage {
  string id = 1;
  string nombre_encuestado = 2;
  string apellido_encuestado = 3;
  string cedula_encuestado = 4;
  string sector = 5;
  string educacion = 6;
  double latitud = 7;
  double longitud = 8;
  string encuestador_nombre = 9;
  string foto_base64 = 10;
  bool sincronizado = 11;
}


// Lo que el cliente envía al llamar CrearFormulario
message FormularioRequest {
  string nombre_encuestado = 1;
  string apellido_encuestado = 2;
  string cedula_encuestado = 3;
  string sector = 4;
  string educacion = 5;
  double latitud = 6;
  double longitud = 7;
  string foto_base64 = 8;
  string encuestador_email = 9;
  string fecha_registro = 10;
}

// Lo que el servidor devuelve al crear confirmación simple
message FormularioResponse {
  bool exitoso = 1;
  string mensaje = 2;
  string id = 3;
}