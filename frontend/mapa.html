<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/db.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encuestas PUCMM - Mapa de Ubicaciones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/css/estilos.css" />
    <script src="/js/base.js"></script>
</head>
<body>

<div class="app-shell">

    <div class="sidebar"></div>

    <div class="main">

        <div class="topbar">
            <div>
                <div class="topbar-title"> Mapa de ubicaciones</div>
                <div class="topbar-sub">Visualización georreferenciada de encuestas registradas</div>
            </div>
            <button class="btn-logout" onclick="cerrarSesion()">
                <i class="bi bi-box-arrow-right"></i> Salir
            </button>
        </div>

        <div class="page-body">

            <div class="map-layout">

                <!-- ── Panel lateral ── -->
                <div class="side-panel">

                    <div>
                        <div class="panel-title">Resumen</div>
                    </div>

                    <div class="stats-row">
                        <div class="stat-box">
                            <div class="stat-label">Total puntos</div>
                            <div class="stat-value" id="totalPuntos">—</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Filtrados</div>
                            <div class="stat-value" id="totalFiltrados">—</div>
                        </div>
                    </div>

                    <button class="btn-panel" id="btnAjustarMapa">
                        <i class="bi bi-arrows-fullscreen"></i> Ajustar al contenido
                    </button>

                    <hr class="panel-divider">

                    <div class="section-label">Filtros</div>

                    <div class="filter-group">
                        <div class="filter-label">Nivel educativo</div>
                        <select id="filtroNivel" class="form-select" onchange="aplicarFiltros()">
                            <option value="">Todos</option>
                            <option value="BASICO">Básico</option>
                            <option value="MEDIO">Medio</option>
                            <option value="GRADO">Grado</option>
                            <option value="POSTGRADO">Postgrado</option>
                            <option value="DOCTORADO">Doctorado</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <div class="filter-label">Encuestador</div>
                        <select id="filtroEncuestador" class="form-select" onchange="aplicarFiltros()">
                            <option value="">Todos</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <div class="filter-label">Sector</div>
                        <input type="text" id="filtroSector" class="form-control"
                               placeholder="Buscar sector…" oninput="aplicarFiltros()">
                    </div>

                    <button class="btn-panel btn-panel-danger" onclick="limpiarFiltros()">
                        <i class="bi bi-x-circle"></i> Limpiar filtros
                    </button>

                    <hr class="panel-divider">

                    <div class="section-label">Leyenda</div>

                    <div class="legend-item">
                        <span class="legend-dot"></span>
                        <span>Punto registrado</span>
                    </div>
                    <div class="legend-item">
                        <i class="bi bi-info-circle" style="font-size:13px; color:#2B5BDB;"></i>
                        <span>Haz clic en un punto para ver detalles</span>
                    </div>

                </div>

                <!-- ── Panel del mapa ── -->
                <div class="map-panel">
                    <div class="map-panel-header">
                        <div>
                            <div class="map-panel-title">Ubicaciones geográficas</div>
                        </div>
                        <span class="map-badge" id="badgePuntos">0 puntos</span>
                    </div>
                    <div id="map"></div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let todasLasEncuestas = [];
    const token  = localStorage.getItem("token");
    const rol    = localStorage.getItem("rol");
    const userId = localStorage.getItem("userId");

    const map = L.map('map', { zoomControl: true }).setView([19.4517, -70.6970], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
    }).addTo(map);

    const markersGroup = L.featureGroup().addTo(map);
    const customIcon = L.divIcon({
        className: '',
        html: `<div style="width:12px;height:12px;border-radius:50%;background:#2B5BDB;border:2px solid #fff;box-shadow:0 0 0 1.5px #2B5BDB,0 2px 6px rgba(43,91,219,0.35);"></div>`,
        iconSize: [12,12], iconAnchor: [6,6], popupAnchor: [0,-8]
    });

    function cargarUbicaciones(encuestas) {
        if (!Array.isArray(encuestas)) return;
        todasLasEncuestas = encuestas;

        const selEncuestador = document.getElementById('filtroEncuestador');
        const encuestadores = [...new Set(
            encuestas.filter(e => e.encuestadorNombre)
                .map(e => `${e.encuestadorNombre} ${e.encuestadorApellido || ''}`.trim())
        )];

        if (rol !== "ADMIN") {
            selEncuestador.closest('div').style.display = 'none';
        }

        encuestadores.forEach(nombre => {
            const opt = document.createElement('option');
            opt.value = nombre;
            opt.textContent = nombre;
            selEncuestador.appendChild(opt);
        });

        renderMarcadores(encuestas);
    }

    function renderMarcadores(encuestas) {
        markersGroup.clearLayers();
        const bounds = [];

        encuestas.forEach(encuesta => {
            const lat = parseFloat(encuesta.ubicacion?.latitud ?? encuesta.latitud);
            const lng = parseFloat(encuesta.ubicacion?.longitud ?? encuesta.longitud);
            if (isNaN(lat) || isNaN(lng)) return;

            const marker = L.marker([lat, lng], { icon: customIcon }).addTo(markersGroup);
            marker.bindPopup(`
                <div class="popup-inner">
                    <div class="popup-name">${encuesta.nombreEncuestado} ${encuesta.apellidoEncuestado}</div>
                    <div class="popup-row"><i class="bi bi-geo-alt-fill"></i> ${encuesta.sector || '—'}</div>
                    <div class="popup-row"><i class="bi bi-mortarboard-fill"></i> ${encuesta.educacion || '—'}</div>
                    <div class="popup-row"><i class="bi bi-person-fill"></i> ${encuesta.encuestadorNombre || '—'}</div>
                    <div class="popup-coords">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>
                </div>
            `, { maxWidth: 260 });

            bounds.push([lat, lng]);
        });

        const total = todasLasEncuestas.filter(e => {
            const lat = parseFloat(e.ubicacion?.latitud ?? e.latitud);
            const lng = parseFloat(e.ubicacion?.longitud ?? e.longitud);
            return !isNaN(lat) && !isNaN(lng);
        }).length;

        document.getElementById('totalPuntos').textContent    = total;
        document.getElementById('totalFiltrados').textContent = bounds.length;
        document.getElementById('badgePuntos').textContent    = `${bounds.length} puntos`;
    }

    function aplicarFiltros() {
        const nivel       = document.getElementById('filtroNivel').value;
        const encuestador = document.getElementById('filtroEncuestador').value;
        const sector      = document.getElementById('filtroSector').value.toLowerCase();

        const filtradas = todasLasEncuestas.filter(e => {
            const okNivel       = !nivel       || e.educacion === nivel;
            const okEncuestador = !encuestador || `${e.encuestadorNombre} ${e.encuestadorApellido || ''}`.trim() === encuestador;
            const okSector      = !sector      || (e.sector || '').toLowerCase().includes(sector);
            return okNivel && okEncuestador && okSector;
        });

        renderMarcadores(filtradas);
    }

    function limpiarFiltros() {
        document.getElementById('filtroNivel').value       = '';
        document.getElementById('filtroEncuestador').value = '';
        document.getElementById('filtroSector').value      = '';
        renderMarcadores(todasLasEncuestas);
    }

    document.getElementById('btnAjustarMapa').addEventListener('click', () => {
        if (markersGroup.getLayers().length > 0) {
            map.fitBounds(markersGroup.getBounds(), { padding: [40, 40] });
        }
    });

    const urlFetch = rol === "ADMIN" ? '/encuestas' : `/encuestas/usuario/${userId}`;
    fetch(urlFetch, { headers: { "Authorization": `Bearer ${token}` } })
        .then(async res => {
            const data = JSON.parse(await res.text());
            cargarUbicaciones(data);
        })
        .catch(err => console.error("Error cargando encuestas:", err));

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = '/index.html';
    }

    setTimeout(() => map.invalidateSize(), 200);
</script>
</body>
</html>
