<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/db.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuestas PUCMM - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <style>
        :root {
            --cream: #FAF8F4;
            --ink: #1A1714;
            --ink-light: #6B6560;
            --ink-lighter: #B8B3AE;
            --accent: #2B5BDB;
            --accent-dark: #1A3A9E;
            --success: #1A7A4A;
            --danger: #A32D2D;
            --danger-bg: #FCEBEB;
            --border: #E5E1DB;
            --surface: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            background: var(--cream);
            overflow: hidden;
        }

        /* ── COLUMNA IZQUIERDA ── */
        .login-left {
            flex: 1;
            background: var(--ink);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2.5rem;
            min-width: 280px;
        }

        .login-left-grid {
            position: absolute;
            inset: 0;
            background-image:
                    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .login-left-glow {
            position: absolute;
            inset: 0;
            background:
                    radial-gradient(ellipse 80% 60% at 20% 80%, rgba(43,91,219,0.35) 0%, transparent 60%),
                    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(43,91,219,0.15) 0%, transparent 55%);
        }

        .login-brand {
            position: absolute;
            top: 2.5rem;
            left: 2.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1;
        }

        .login-brand-sq {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-brand-sq i { color: white; font-size: 15px; }
        .login-brand-name { color: white; font-weight: 600; font-size: 14px; }

        .login-left-text {
            position: relative;
            z-index: 1;
        }

        .login-tagline {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: white;
            line-height: 1.3;
            margin-bottom: 8px;
        }

        .login-tagline-sub {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.3px;
        }

        /* ── COLUMNA DERECHA ── */
        .login-right {
            flex: 1.1;
            max-width: 480px;
            background: var(--surface);
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 4px;
        }

        .login-desc {
            font-size: 13px;
            color: var(--ink-light);
            margin-bottom: 2rem;
        }

        /* ── FORM ── */
        .form-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 6px;
        }

        .form-control {
            background: var(--cream);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--ink);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            transition: border .2s, box-shadow .2s;
        }

        .form-control:focus {
            background: white;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(43,91,219,0.08);
            color: var(--ink);
        }

        .form-control::placeholder { color: var(--ink-lighter); }

        .input-group-text {
            background: var(--cream);
            border: 1px solid var(--border);
            color: var(--ink-light);
        }

        /* ── BOTÓN LOGIN ── */
        .btn-login {
            background: var(--accent);
            border: none;
            color: white;
            font-weight: 500;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            padding: 12px;
            border-radius: 8px;
            transition: background .2s;
            letter-spacing: 0.2px;
        }

        .btn-login:hover { background: var(--accent-dark); color: white; }
        .btn-login:active { transform: scale(0.99); }
        .btn-login:disabled { background: var(--ink-lighter); }

        /* ── ALERTA ── */
        .alert-custom {
            background: var(--danger-bg);
            border: 0.5px solid rgba(163,45,45,0.25);
            color: var(--danger);
            border-radius: 8px;
            font-size: 13px;
            padding: 10px 14px;
        }

        /* ── FOOTER ── */
        .login-footer {
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-footer-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }

        .login-footer-txt {
            font-size: 11px;
            color: var(--ink-lighter);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            .login-left { display: none; }
            .login-right { max-width: 100%; padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

<!-- Columna izquierda — marca -->
<div class="login-left">
    <div class="login-left-grid"></div>
    <div class="login-left-glow"></div>

    <div class="login-brand">
        <span class="login-brand-name">Encuestas PUCMM</span>
    </div>

    <div class="login-left-text">
        <div class="login-tagline">Oficina de<br>Planeamiento</div>
        <div class="login-tagline-sub">Sistema de gestión de encuestas en campo</div>
    </div>
</div>

<!-- Columna derecha — formulario -->
<div class="login-right">
    <div class="login-title">Bienvenido de vuelta</div>
    <div class="login-desc">Ingresa tus credenciales para continuar</div>

    <div id="alerta" class="alert alert-custom d-none mb-3" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>
        <span id="mensajeAlerta"></span>
    </div>

    <form id="formLogin">
        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="email"
                       placeholder="correo@pucmm.edu.do" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Contraseña</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password"
                       placeholder="••••••••" required>
                <button class="input-group-text" type="button" id="togglePassword"
                        style="cursor:pointer; border-left: none;">
                    <i class="bi bi-eye" id="iconoOjo"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-login w-100" id="btnLogin">
            <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
        </button>
    </form>

    <div class="credenciales mt-4">
        <div class="notiglow"></div>
        <div class="notiborderglow"></div>
        <div class="notititle">Credenciales</div>
        <div class="notibody">admin@ce.pucmm.edu.do</div>
        <div class="notibody">admin123</div>
    </div>

    <div class="login-footer">
        <div class="login-footer-dot"></div>
        <span class="login-footer-txt">Proyecto Final — ICC352 — PUCMM 2026</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "";

    // Toggle mostrar/ocultar contraseña
    document.getElementById("togglePassword").addEventListener("click", () => {
        const input = document.getElementById("password");
        const icono = document.getElementById("iconoOjo");
        if (input.type === "password") {
            input.type = "text";
            icono.className = "bi bi-eye-slash-fill";
        } else {
            input.type = "password";
            icono.className = "bi bi-eye-fill";
        }
    });

    document.getElementById("formLogin").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const btn = document.getElementById("btnLogin");

        // Deshabilitar botón mientras carga
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verificando...';

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            if (!response.ok) {
                const error = await response.text();
                mostrarAlerta(error);
                return;
            }

            const data = await response.json();
            localStorage.setItem("token", data.token);
            localStorage.setItem("email", email);
            localStorage.setItem("rol", data.rol);
            localStorage.setItem("nombre", data.nombre);
            localStorage.setItem("apellido", data.apellido);
            localStorage.setItem("userId", data.id);

            // Guardar también en IndexedDB para modo offline
            await inicializarDB();
            await guardarSesionLocal(data.token, email, data.rol);

            window.location.href = "/dashboard.html";

        } catch (error) {
            mostrarAlerta("Error al conectar con el servidor");
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión';
        }
    });

    function mostrarAlerta(mensaje) {
        const alerta = document.getElementById("alerta");
        const mensajeAlerta = document.getElementById("mensajeAlerta");
        mensajeAlerta.textContent = mensaje;
        alerta.classList.remove("d-none");
    }
</script>
</body>
</html>
