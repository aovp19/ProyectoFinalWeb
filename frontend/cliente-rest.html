<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuestas PUCMM — Cliente REST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <script src="/js/db.js"></script>
    <script src="/js/base.js"></script>
</head>
<body>
<div class="app-shell">
    <div class="sidebar"></div>
    <div class="main">
        <div class="topbar">
            <div class="header">
                <div>
                    <div class="topbar-title"><i class="bi bi-braces fs-4"></i> Cliente REST</div>
                </div>
            </div>
        </div>

        <div class="page-body">
            <div class="container py-4 d-flex flex-column gap-4">

                <!-- LOGIN -->
                <div class="card mb-4" id="seccionLogin">
                    <div class="card-header">
                        <i class="bi bi-key me-2"></i>1. Autenticación — obtener JWT
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-5">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" id="loginEmail" class="form-control" value="admin@ce.pucmm.edu.do">
                            </div>
                            <div class="col-md-5">
                                <label class="form-label fw-semibold">Contraseña</label>
                                <input type="password" id="loginPassword" class="form-control" value="admin123">
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button class="btn btn-dark w-100" onclick="hacerLogin()">
                                    <i class="bi bi-box-arrow-in-right me-1"></i>Login
                                </button>
                            </div>
                        </div>
                        <div class="mt-3" id="tokenSection" style="display:none">
                            <label class="form-label fw-semibold text-success">
                                <i class="bi bi-check-circle me-1"></i>Token obtenido
                            </label>
                            <div class="token-display" id="tokenDisplay"></div>
                        </div>
                    </div>
                </div>

                <!-- LISTAR -->
                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-list-ul me-2"></i>2. GET /api/formularios</span>
                        <button class="btn btn-sm btn-outline-dark" onclick="listarFormularios()">
                            <i class="bi bi-arrow-clockwise me-1"></i>Ejecutar
                        </button>
                    </div>
                    <div class="card-body">
<!--                        <div class="row g-2 mb-3">-->
<!--                            <div class="col-md-6">-->
<!--                                <label class="form-label">Filtrar por usuarioId (opcional)</label>-->
<!--                                <input type="text" id="filtroUsuarioId" class="form-control form-control-sm" placeholder="Dejar vacío para ver todos">-->
<!--                            </div>-->
<!--                        </div>-->
                        <div id="tablaFormularios">
                            <div class="text-center text-muted py-3">
                                <i class="bi bi-inbox fs-3"></i>
                                <p class="mt-2 mb-0">Haz login y ejecuta la petición</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- CREAR -->
                <div class="card mb-4">
                    <div class="card-header">
                        <i class="bi bi-plus-circle me-2"></i>3. POST /api/formularios
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Nombre encuestado</label>
                                <input type="text" id="cNombre" class="form-control" placeholder="Ej: Juan">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Apellido</label>
                                <input type="text" id="cApellido" class="form-control" placeholder="Ej: Pérez">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Sector</label>
                                <input type="text" id="cSector" class="form-control" placeholder="Ej: Villa Consuelo">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Nivel escolar</label>
                                <select id="cNivel" class="form-select">
                                    <option value="BASICO">Básico</option>
                                    <option value="MEDIO">Medio</option>
                                    <option value="GRADO">Grado universitario</option>
                                    <option value="POSTGRADO">Postgrado</option>
                                    <option value="DOCTORADO">Doctorado</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Latitud</label>
                                <input type="number" id="cLat" class="form-control" value="18.4749" step="0.0001">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Longitud</label>
                                <input type="number" id="cLng" class="form-control" value="-69.9307" step="0.0001">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Foto (base64 — opcional)</label>
                                <input type="file" id="cFoto" class="form-control" accept="image/*" onchange="procesarFoto(this)">
                                <div id="fotoPreview" style="display:none;margin-top:8px">
                                    <img id="fotoImg" style="height:80px;border-radius:8px;border:1px solid #dee2e6">
                                </div>
                            </div>
                            <div class="col-12">
                                <button class="btn btn-dark" onclick="crearFormulario()">
                                    <i class="bi bi-send me-2"></i>Crear formulario via REST
                                </button>
                            </div>
                        </div>
                        <div class="mt-3">
                            <label class="form-label fw-semibold">Respuesta del servidor</label>
                            <div class="result-box" id="resultadoCrear">Esperando petición...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    let jwtToken = null;
    let fotoBase64 = null;

    async function hacerLogin() {
        const email    = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const data = await res.json();
            jwtToken = data.token;

            document.getElementById('tokenSection').style.display = 'block';
            document.getElementById('tokenDisplay').textContent = jwtToken;

        } catch (err) {
            alert('Error al hacer login: ' + err.message);
        }
    }

    async function listarFormularios() {
        if (!jwtToken) { alert('Primero haz login'); return; }

        const url = '/api/formularios';

        try {
            const res = await fetch(url, {
                headers: { 'Authorization': `Bearer ${jwtToken}` }
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            renderTabla(data);

        } catch (err) {
            document.getElementById('tablaFormularios').innerHTML =
                `<div class="alert alert-danger">Error: ${err.message}</div>`;
        }
    }

    function renderTabla(formularios) {
        if (!formularios.length) {
            document.getElementById('tablaFormularios').innerHTML =
                '<div class="alert alert-info">No hay formularios para mostrar.</div>';
            return;
        }

        const filas = formularios.map(f => `
        <tr>
            <td>${f.nombreEncuestado || ''} ${f.apellidoEncuestado || ''}</td>
            <td>${f.sector || '—'}</td>
            <td><span class="badge bg-secondary status-badge">${f.educacion || f.nivelEscolar || '—'}</span></td>
            <td>${f.encuestadorNombre || '—'}</td>
            <td><span class="badge ${f.sincronizado ? 'bg-success' : 'bg-warning'} status-badge">${f.sincronizado ? 'Sincronizado' : 'Pendiente'}</span></td>
            <td>${f.latitud ? f.latitud.toFixed(4) : '—'}, ${f.longitud ? f.longitud.toFixed(4) : '—'}</td>
            <td>${f.fotoBase64 ? `<img src="${f.fotoBase64}" class="foto-thumb">` : '<span class="text-muted">—</span>'}</td>
        </tr>
    `).join('');

        document.getElementById('tablaFormularios').innerHTML = `
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Encuestado</th>
                        <th>Sector</th>
                        <th>Nivel</th>
                        <th>Encuestador</th>
                        <th>Estado</th>
                        <th>Coordenadas</th>
                        <th>Foto</th>
                    </tr>
                </thead>
                <tbody>${filas}</tbody>
            </table>
        </div>
        <div class="text-muted" style="font-size:12px">${formularios.length} registro(s) encontrados</div>
    `;
    }

    async function crearFormulario() {
        if (!jwtToken) { alert('Primero haz login'); return; }

        const body = {
            nombreEncuestado:   document.getElementById('cNombre').value,
            apellidoEncuestado: document.getElementById('cApellido').value,
            sector:             document.getElementById('cSector').value,
            educacion:          document.getElementById('cNivel').value,
            ubicacion: {
                latitud:  parseFloat(document.getElementById('cLat').value),
                longitud: parseFloat(document.getElementById('cLng').value)
            },
            fotoBase64:         fotoBase64 || null,
            sincronizado:       true
        };

        const resultado = document.getElementById('resultadoCrear');

        try {
            const res = await fetch('/api/formularios', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${jwtToken}`
                },
                body: JSON.stringify(body)
            });

            const data = await res.json();
            resultado.className = res.ok ? 'result-box' : 'result-box error';
            resultado.textContent = JSON.stringify(data, null, 2);

            if (res.ok) listarFormularios();

        } catch (err) {
            resultado.className = 'result-box error';
            resultado.textContent = 'Error: ' + err.message;
        }
    }

    function procesarFoto(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            fotoBase64 = e.target.result;
            document.getElementById('fotoPreview').style.display = 'block';
            document.getElementById('fotoImg').src = fotoBase64;
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
