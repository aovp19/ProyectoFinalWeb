<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/db.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuestas PUCMM - Mis Encuestas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <script src="/js/base.js"></script>
</head>
<body>

<div class="app-shell">

    <div class="sidebar"></div>

    <div class="main">

        <div class="topbar">
            <div>
                <div class="topbar-title">Mis encuestas</div>
                <div class="topbar-sub">Encuestas registradas en campo</div>
            </div>
            <div class="topbar-actions">
                <a href="/formulario.html" class="btn-primary-glass">
                    <i class="bi bi-plus-lg"></i>Nueva encuesta
                </a>
                <button class="btn-logout" onclick="cerrarSesion()">
                    <i class="bi bi-box-arrow-right"></i>Salir
                </button>
            </div>
        </div>

        <div class="page-body">

            <div id="alerta" class="alert-glass-danger d-none mb-3">
                <i class="bi bi-exclamation-circle me-2"></i>
                <span id="mensajeAlerta"></span>
            </div>
            <div id="alertaExito" class="alert-glass-success d-none mb-3">
                <i class="bi bi-check-circle me-2"></i>
                <span id="mensajeExito"></span>
            </div>

            <!-- Filtros -->
            <div class="table-wrap mb-3 p-3">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label" style="font-size:12px;font-weight:600">Sector</label>
                        <input type="text" id="filtroSector" class="form-control form-control-sm"
                               placeholder="Buscar por sector" oninput="aplicarFiltros()">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label" style="font-size:12px;font-weight:600">Nivel educativo</label>
                        <select id="filtroNivel" class="form-select form-select-sm" onchange="aplicarFiltros()">
                            <option value="">Todos</option>
                            <option value="BASICO">Básico</option>
                            <option value="MEDIO">Medio</option>
                            <option value="UNIVERSITARIO">Universitario</option>
                            <option value="POSTGRADO">Postgrado</option>
                            <option value="DOCTORADO">Doctorado</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label" style="font-size:12px;font-weight:600">Fecha desde</label>
                        <input type="date" id="filtroFechaDesde" class="form-control form-control-sm"
                               onchange="aplicarFiltros()">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label" style="font-size:12px;font-weight:600">Fecha hasta</label>
                        <input type="date" id="filtroFechaHasta" class="form-control form-control-sm"
                               onchange="aplicarFiltros()">
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-sm btn-outline-secondary w-100" onclick="limpiarFiltros()">
                            <i class="bi bi-x-circle me-1"></i>Limpiar
                        </button>
                    </div>
                </div>
                <div class="mt-2" style="font-size:12px;color:var(--ink-light)" id="infoResultados"></div>
            </div>

            <div class="table-wrap">
                <div class="table-responsive">
                    <table class="table-glass">
                        <thead>
                        <tr>
                            <th>Nombre</th>
                            <th class="d-none d-md-table-cell">Cédula</th>
                            <th class="d-none d-md-table-cell">Sector</th>
                            <th class="d-none d-md-table-cell">Nivel educativo</th>
                            <th>Estado</th>
                            <th style="text-align:right">Acciones</th>
                        </tr>
                        </thead>
                        <tbody id="tablaEncuestas">
                        <tr>
                            <td colspan="6" style="text-align:center;color:var(--ink-light);padding:2rem;">
                                <span class="spinner-border spinner-border-sm me-2"></span>
                                Cargando...
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="d-flex justify-content-center mt-3" id="paginacion"></div>
        </div>
    </div>
</div>

<!-- Modal Confirmar Eliminar -->
<div class="modal fade modal-glass" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirmar eliminación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>¿Estás seguro que deseas eliminar esta encuesta? Esta acción no se puede deshacer.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary-glass" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn-danger-glass" onclick="confirmarEliminar()">
                    <i class="bi bi-trash"></i>Eliminar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Editar Encuesta -->
<div class="modal fade modal-glass" id="modalEditar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar encuesta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nombre</label>
                        <input type="text" id="editNombre" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Apellido</label>
                        <input type="text" id="editApellido" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Cédula</label>
                        <input type="text" id="editCedula" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Sector</label>
                        <input type="text" id="editSector" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Nivel educativo</label>
                        <select id="editEducacion" class="form-select">
                            <option value="BASICO">Básico</option>
                            <option value="MEDIO">Medio</option>
                            <option value="UNIVERSITARIO">Universitario</option>
                            <option value="POSTGRADO">Postgrado</option>
                            <option value="DOCTORADO">Doctorado</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary-glass" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn-primary-glass" onclick="guardarEdicion()">
                    <i class="bi bi-check-lg"></i>Guardar cambios
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/paginacion.js"></script>
<script>
    const API_URL = "";
    const token = localStorage.getItem("token");
    const email = localStorage.getItem("email");
    const userId = localStorage.getItem("userId");

    if (!token) window.location.href = "/index.html";

    let encuestaIdEliminar = null;
    let paginador;

    async function cargarEncuestas() {
        try {
            let encuestas = [];
            const rol = localStorage.getItem("rol");

            if (await estaOnline()) {          // ← await
                let url = `${API_URL}/encuestas`;
                if (rol !== "ADMIN") {
                    url = `${API_URL}/encuestas/usuario/${userId}`;
                }
                const response = await fetch(url, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                encuestas = await response.json();
            }

            await inicializarDB();
            const locales = await obtenerEncuestasLocales();
            const localesPendientes = locales.filter(l => !l.sincronizado);
            encuestas = [...encuestas, ...localesPendientes];

            paginador = window.Paginador({
                datos:      encuestas,
                contenedor: 'tablaEncuestas',
                paginacion: 'paginacion',
                info:       'infoResultados',
                porPagina:  10,
                renderFila: renderFilaEncuesta
            });

        } catch (error) {
            await inicializarDB();
            const locales = await obtenerEncuestasLocales();
            const localesPendientes = locales.filter(l => !l.sincronizado); // ← faltaba este filtro
            paginador = window.Paginador({
                datos:      localesPendientes,
                contenedor: 'tablaEncuestas',
                paginacion: 'paginacion',
                info:       'infoResultados',
                porPagina:  10,
                renderFila: renderFilaEncuesta
            });
        }
    }

    function renderFilaEncuesta(e) {
        return `
        <tr>
            <td>${e.nombreEncuestado || ''} ${e.apellidoEncuestado || ''}</td>
            <td class="d-none d-md-table-cell">${e.cedula || '-'}</td>
            <td class="d-none d-md-table-cell">${e.sector || '-'}</td>
            <td class="d-none d-md-table-cell">${e.educacion || '-'}</td>
            <td>
                <span class="badge-sync ${e.sincronizado ? 'badge-sincronizado' : 'badge-pendiente'}">
                    ${e.sincronizado ? 'Sincronizado' : 'Pendiente'}
                </span>
            </td>
            <td style="text-align:right">
                <div class="dropdown">
                    <button class="btn-tres-puntos"
                            data-bs-toggle="dropdown"
                            data-bs-auto-close="true"
                            data-bs-popper="fixed">
                        <i class="bi bi-three-dots-vertical"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-glass dropdown-menu-end">
                        ${!e.sincronizado ? `
                        <li>
                            <a class="dropdown-item" href="#"
                               onclick="abrirModalEditar(this)" data-encuesta="${encodeURIComponent(JSON.stringify(e))}">
                                <i class="bi bi-pencil me-2"></i>Editar
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item text-danger-glass" href="#"
                               onclick="abrirModalEliminar('${e.id}')">
                                <i class="bi bi-trash me-2"></i>Eliminar
                            </a>
                        </li>` : `
                        <li>
                            <span class="dropdown-item" style="color:var(--ink-lighter);cursor:default;">
                                <i class="bi bi-lock me-2"></i>Solo lectura
                            </span>
                        </li>`}
                    </ul>
                </div>
            </td>
        </tr>`;
    }

    function abrirModalEliminar(id) {
        encuestaIdEliminar = id;
        new bootstrap.Modal(document.getElementById("modalEliminar")).show();
    }

    async function confirmarEliminar() {
        const esLocal = typeof encuestaIdEliminar === "number" ||
            !isNaN(encuestaIdEliminar);

        if (!await estaOnline() || esLocal) {
            await eliminarEncuestaLocal(Number(encuestaIdEliminar));
            bootstrap.Modal.getInstance(document.getElementById("modalEliminar")).hide();
            mostrarExito("Encuesta eliminada localmente");
            cargarEncuestas();
            return;
        }

        try {
            const response = await fetch(`${API_URL}/encuestas/${encuestaIdEliminar}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });

            if (!response.ok) {
                const error = await response.text();
                mostrarError(error);
                return;
            }

            bootstrap.Modal.getInstance(document.getElementById("modalEliminar")).hide();
            mostrarExito("Encuesta eliminada exitosamente");
            cargarEncuestas();

        } catch (error) {
            mostrarError("Error al eliminar encuesta");
        }
    }

    function mostrarError(mensaje) {
        const alerta = document.getElementById("alerta");
        document.getElementById("mensajeAlerta").textContent = mensaje;
        alerta.classList.remove("d-none");
        setTimeout(() => alerta.classList.add("d-none"), 4000);
    }

    function mostrarExito(mensaje) {
        const alerta = document.getElementById("alertaExito");
        document.getElementById("mensajeExito").textContent = mensaje;
        alerta.classList.remove("d-none");
        setTimeout(() => alerta.classList.add("d-none"), 4000);
    }

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = "/index.html";
    }

    function abrirModalEditar(el) {
        const encuesta = JSON.parse(decodeURIComponent(el.dataset.encuesta));
        document.getElementById('editId').value        = encuesta.id;
        document.getElementById('editNombre').value    = encuesta.nombreEncuestado || '';
        document.getElementById('editApellido').value  = encuesta.apellidoEncuestado || '';
        document.getElementById('editCedula').value    = encuesta.cedula || '';
        document.getElementById('editSector').value    = encuesta.sector || '';
        document.getElementById('editEducacion').value = encuesta.educacion || 'BASICO';
        new bootstrap.Modal(document.getElementById('modalEditar')).show();
    }

    async function guardarEdicion() {
        const id = document.getElementById('editId').value;
        const datos = {
            nombreEncuestado:   document.getElementById('editNombre').value,
            apellidoEncuestado: document.getElementById('editApellido').value,
            cedula:             document.getElementById('editCedula').value,
            sector:             document.getElementById('editSector').value,
            educacion:          document.getElementById('editEducacion').value,
        };

        const esLocal = !isNaN(id);

        if (!await estaOnline() || esLocal) {
            // Actualiza en IndexedDB
            await actualizarEncuestaLocal(Number(id), datos);
        } else {
            // Actualiza en el servidor
            const response = await fetch(`${API_URL}/encuestas/${id}`, {
                method: 'PUT',   // o 'PATCH' según tu API
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(datos)
            });
            if (!response.ok) {
                mostrarError('Error al guardar los cambios');
                return;
            }
        }

        bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
        mostrarExito('Encuesta actualizada correctamente');
        cargarEncuestas();
    }

    window.addEventListener("online", async () => {
        mostrarExito("Conexión restaurada - Sincronizando...");
        await sincronizarPendientes();
    });

    function aplicarFiltros() {
        const sector = document.getElementById('filtroSector').value.toLowerCase();
        const nivel  = document.getElementById('filtroNivel').value;
        const desde  = document.getElementById('filtroFechaDesde').value;
        const hasta  = document.getElementById('filtroFechaHasta').value;

        paginador.filtrar(e => {
            const okSector = !sector || (e.sector||'').toLowerCase().includes(sector);
            const okNivel  = !nivel  || e.educacion === nivel;
            let   okFecha  = true;
            if (desde || hasta) {
                const f = e.fechaRegistro ? new Date(e.fechaRegistro) : null;
                if (!f) return false;
                if (desde) okFecha = okFecha && f >= new Date(desde);
                if (hasta) { const h = new Date(hasta); h.setHours(23,59,59); okFecha = okFecha && f <= h; }
            }
            return okSector && okNivel && okFecha;
        });
    }

    function limpiarFiltros() {
        document.getElementById('filtroSector').value = '';
        document.getElementById('filtroNivel').value  = '';
        document.getElementById('filtroFechaDesde').value = '';
        document.getElementById('filtroFechaHasta').value = '';
        paginador.limpiar();
    }

    async function sincronizarPendientes() {
        await inicializarDB();
        const pendientes = await obtenerEncuestasPendientes();

        if (pendientes.length === 0) return;

        let sincronizadas = 0;
        for (const encuesta of pendientes) {
            try {
                const encuestaServidor = {
                    nombreEncuestado: encuesta.nombreEncuestado,
                    apellidoEncuestado: encuesta.apellidoEncuestado,
                    cedula: encuesta.cedula,
                    sector: encuesta.sector,
                    educacion: encuesta.educacion,
                    fotoBase64: encuesta.fotoBase64,
                    ubicacion: encuesta.ubicacion,
                    sincronizado: true
                };
                const response = await fetch(`${API_URL}/encuestas`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(encuestaServidor)
                });

                if (response.ok) {
                    await eliminarEncuestaLocal(encuesta.id);
                    sincronizadas++;
                }
            } catch (error) {
                console.error("Error sincronizando encuesta:", error);
            }
        }

        if (sincronizadas > 0) {
            mostrarExito(`${sincronizadas} encuesta(s) sincronizada(s) exitosamente`);
            cargarEncuestas();
        }
    }

    async function iniciar() {
        await inicializarDB();
        if (await estaOnline()) {          // ← await
            await sincronizarPendientes();
        }
        cargarEncuestas();
    }

    document.addEventListener('DOMContentLoaded', () => iniciar());
</script>
</body>
</html>
